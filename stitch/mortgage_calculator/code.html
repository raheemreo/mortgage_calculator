<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Mortgage Calculator</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#1e3a8a", // Navy Blue
                        "background-light": "#f8fafc", // Soft white/slate
                        "background-dark": "#0f172a",
                        emerald: "#10b981", // Emerald Green
                    },
                    fontFamily: {
                        display: ["Inter", "sans-serif"],
                    },
                    borderRadius: {
                        DEFAULT: "0.5rem",
                    },
                },
            },
        };
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<header class="bg-white dark:bg-slate-800 shadow-sm px-4 py-4 flex items-center justify-between sticky top-0 z-10">
<div class="flex items-center gap-3">
<span class="material-icons text-primary dark:text-blue-400">real_estate_agent</span>
<h1 class="text-xl font-bold">Mortgage Calc</h1>
</div>
<button class="material-icons text-slate-500 dark:text-slate-400">menu</button>
</header>
<main class="flex-1 p-4 flex flex-col gap-6">
<div class="bg-white dark:bg-slate-800 rounded-xl shadow-md p-6 border border-slate-100 dark:border-slate-700">
<p class="text-sm font-medium text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-2">Est. Monthly Payment</p>
<h2 class="text-4xl font-bold text-emerald dark:text-emerald-400">$2,450.00</h2>
<div class="mt-4 pt-4 border-t border-slate-100 dark:border-slate-700 flex justify-between text-sm">
<div>
<span class="text-slate-500 dark:text-slate-400 block">Principal &amp; Interest</span>
<span class="font-medium">$1,980.00</span>
</div>
<div class="text-right">
<span class="text-slate-500 dark:text-slate-400 block">Taxes &amp; Ins.</span>
<span class="font-medium">$470.00</span>
</div>
</div>
</div>
<div class="bg-white dark:bg-slate-800 rounded-xl shadow-sm p-5 border border-slate-100 dark:border-slate-700">
<h3 class="text-lg font-semibold mb-4 border-b border-slate-100 dark:border-slate-700 pb-2">Loan Details</h3>
<div class="space-y-4">
<div>
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Home Price</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="text-slate-500 sm:text-sm">$</span>
</div>
<input class="pl-7 block w-full rounded-md border-slate-300 dark:border-slate-600 dark:bg-slate-700 focus:ring-primary focus:border-primary sm:text-sm" type="text" value="450,000"/>
</div>
</div>
<div>
<div class="flex justify-between items-center mb-1">
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300">Down Payment</label>
<span class="text-sm text-slate-500 dark:text-slate-400">20%</span>
</div>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="text-slate-500 sm:text-sm">$</span>
</div>
<input class="pl-7 block w-full rounded-md border-slate-300 dark:border-slate-600 dark:bg-slate-700 focus:ring-primary focus:border-primary sm:text-sm" type="text" value="90,000"/>
</div>
</div>
<div class="grid grid-cols-2 gap-4">
<div>
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Term</label>
<select class="block w-full rounded-md border-slate-300 dark:border-slate-600 dark:bg-slate-700 focus:ring-primary focus:border-primary sm:text-sm">
<option>30 Years</option>
<option>15 Years</option>
<option>10 Years</option>
</select>
</div>
<div>
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Interest Rate</label>
<div class="relative">
<input class="pr-7 block w-full rounded-md border-slate-300 dark:border-slate-600 dark:bg-slate-700 focus:ring-primary focus:border-primary sm:text-sm" type="text" value="6.5"/>
<div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none">
<span class="text-slate-500 sm:text-sm">%</span>
</div>
</div>
</div>
</div>
<div class="pt-2">
<div class="flex items-center justify-between py-2">
<div class="flex items-center gap-2">
<span class="text-sm font-medium text-slate-700 dark:text-slate-300">Include PMI</span>
<span class="material-icons text-[16px] text-slate-400 cursor-help" title="Private Mortgage Insurance">info</span>
</div>
<button class="bg-primary relative inline-flex h-6 w-11 flex-shrink-0 cursor-pointer rounded-full border-2 border-transparent transition-colors duration-200 ease-in-out focus:outline-none" type="button">
<span class="translate-x-5 pointer-events-none inline-block h-5 w-5 transform rounded-full bg-white shadow ring-0 transition duration-200 ease-in-out"></span>
</button>
</div>
<div class="flex items-center justify-between py-2">
<div class="flex items-center gap-2">
<span class="text-sm font-medium text-slate-700 dark:text-slate-300">Include Escrow</span>
<span class="material-icons text-[16px] text-slate-400 cursor-help" title="Taxes and Insurance">info</span>
</div>
<button class="bg-primary relative inline-flex h-6 w-11 flex-shrink-0 cursor-pointer rounded-full border-2 border-transparent transition-colors duration-200 ease-in-out focus:outline-none" type="button">
<span class="translate-x-5 pointer-events-none inline-block h-5 w-5 transform rounded-full bg-white shadow ring-0 transition duration-200 ease-in-out"></span>
</button>
</div>
</div>
</div>
</div>
<button class="w-full bg-primary hover:bg-blue-900 text-white font-semibold py-4 rounded-xl shadow-lg transition-colors flex items-center justify-center gap-2 text-lg mt-2">
            Calculate
            <span class="material-icons">arrow_forward</span>
</button>
</main>
<div class="bg-slate-200 dark:bg-slate-800 p-4 text-center text-sm text-slate-500 dark:text-slate-400 border-t border-slate-300 dark:border-slate-700">
<p>Advertisement</p>
<div class="mt-2 w-full max-w-[320px] h-[50px] bg-slate-300 dark:bg-slate-700 mx-auto rounded flex items-center justify-center">
<span class="text-xs">Find Low Rates Today</span>
</div>
</div>

</body></html>
