<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>DTI Calculator</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            primary: "#1e3a8a", // Navy Blue
            "background-light": "#f3f4f6", // Soft White/Gray
            "background-dark": "#111827",
            "card-light": "#ffffff",
            "card-dark": "#1f2937",
            "text-light": "#1f2937",
            "text-dark": "#f9fafb",
            "text-muted-light": "#6b7280",
            "text-muted-dark": "#9ca3af",
            "border-light": "#e5e7eb",
            "border-dark": "#374151",
          },
          fontFamily: {
            display: ["Inter", "sans-serif"],
          },
          borderRadius: {
            DEFAULT: "0.75rem",
          },
        },
      },
    };
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
  <style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  <style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  <style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>

<body
  class="bg-background-light dark:bg-background-dark text-text-light dark:text-text-dark font-display min-h-screen antialiased flex flex-col">
  <header
    class="pt-12 pb-4 px-6 bg-card-light dark:bg-card-dark border-b border-border-light dark:border-border-dark sticky top-0 z-10 flex items-center justify-between">
    <button
      class="p-2 -ml-2 text-text-muted-light dark:text-text-muted-dark hover:text-text-light dark:hover:text-text-dark transition-colors">
      <span class="material-icons">arrow_back</span>
    </button>
    <h1 class="text-lg font-semibold text-center flex-1">DTI Calculator</h1>
    <button
      class="p-2 -mr-2 text-text-muted-light dark:text-text-muted-dark hover:text-text-light dark:hover:text-text-dark transition-colors">
      <span class="material-icons">info_outline</span>
    </button>
  </header>
  <main class="p-6 max-w-md mx-auto space-y-8 pb-24 flex-1">
    <section
      class="bg-card-light dark:bg-card-dark p-6 rounded shadow-sm border border-border-light dark:border-border-dark flex flex-col items-center justify-center space-y-4">
      <h2 class="text-sm font-medium text-text-muted-light dark:text-text-muted-dark uppercase tracking-wider">Your
        Debt-to-Income</h2>
      <div class="relative w-48 h-24 overflow-hidden flex items-end justify-center mt-4">
        <svg class="absolute top-0 left-0 w-full h-full" viewBox="0 0 100 50">
          <path class="dark:stroke-[#374151]" d="M 10 50 A 40 40 0 0 1 90 50" fill="none" stroke="#e5e7eb"
            stroke-linecap="round" stroke-width="12"></path>
          <path class="stroke-primary" d="M 10 50 A 40 40 0 0 1 50 10" fill="none" stroke="#1e3a8a"
            stroke-linecap="round" stroke-width="12"></path>
        </svg>
        <div class="z-10 text-center mb-[-0.5rem]">
          <span class="text-4xl font-bold text-text-light dark:text-text-dark">28%</span>
        </div>
      </div>
      <p class="text-sm font-medium text-primary mt-2 flex items-center gap-1">
        <span class="material-icons text-sm">check_circle</span>
        Healthy Range
      </p>
    </section>
    <section class="space-y-6">
      <div class="space-y-2">
        <label class="block text-sm font-medium text-text-light dark:text-text-dark" for="income">Monthly Gross
          Income</label>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
            <span class="text-text-muted-light dark:text-text-muted-dark font-medium">$</span>
          </div>
          <input
            class="block w-full pl-8 pr-4 py-4 bg-card-light dark:bg-card-dark border border-border-light dark:border-border-dark rounded text-lg font-medium text-text-light dark:text-text-dark focus:ring-2 focus:ring-primary focus:border-primary transition-shadow placeholder-text-muted-light dark:placeholder-text-muted-dark"
            id="income" placeholder="0.00" type="number" value="8500" />
        </div>
        <p class="text-xs text-text-muted-light dark:text-text-muted-dark">Before taxes and deductions</p>
      </div>
      <div class="space-y-2">
        <label class="block text-sm font-medium text-text-light dark:text-text-dark" for="debt">Total Monthly
          Debt</label>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
            <span class="text-text-muted-light dark:text-text-muted-dark font-medium">$</span>
          </div>
          <input
            class="block w-full pl-8 pr-4 py-4 bg-card-light dark:bg-card-dark border border-border-light dark:border-border-dark rounded text-lg font-medium text-text-light dark:text-text-dark focus:ring-2 focus:ring-primary focus:border-primary transition-shadow placeholder-text-muted-light dark:placeholder-text-muted-dark"
            id="debt" placeholder="0.00" type="number" value="2380" />
        </div>
        <p class="text-xs text-text-muted-light dark:text-text-muted-dark">Mortgage, auto, student loans, credit cards
        </p>
      </div>
    </section>
    <section
      class="w-full h-16 bg-gray-200 dark:bg-gray-800 flex items-center justify-center border border-dashed border-gray-400 dark:border-gray-600 rounded">
      <span class="text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-widest">Banner Ad
        Space</span>
    </section>
    <section
      class="bg-card-light dark:bg-card-dark rounded border border-border-light dark:border-border-dark overflow-hidden">
      <div class="p-4 border-b border-border-light dark:border-border-dark flex justify-between items-center">
        <span class="text-sm font-medium text-text-muted-light dark:text-text-muted-dark">Front-End DTI (Housing)</span>
        <span class="text-sm font-semibold text-text-light dark:text-text-dark">18%</span>
      </div>
      <div class="p-4 flex justify-between items-center">
        <span class="text-sm font-medium text-text-muted-light dark:text-text-muted-dark">Back-End DTI (Total)</span>
        <span class="text-sm font-semibold text-text-light dark:text-text-dark">28%</span>
      </div>
    </section>

    <div class="pt-6">
      <button
        class="w-full bg-primary text-white font-semibold text-lg py-4 rounded shadow-md hover:bg-opacity-90 transition-all focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary dark:focus:ring-offset-background-dark">
        Calculate Options
      </button>
    </div>
  </main>
  <nav
    class="fixed bottom-0 left-0 right-0 bg-card-light dark:bg-card-dark border-t border-border-light dark:border-border-dark z-30 pb-safe">
    <div class="flex justify-around items-center h-16 max-w-md mx-auto">
      <a class="flex flex-col items-center justify-center w-full h-full text-text-muted-light dark:text-text-muted-dark hover:text-primary transition-colors"
        href="#">
        <span class="material-icons text-2xl mb-1">home</span>
        <span class="text-[10px] font-medium">Home</span>
      </a>
      <a class="flex flex-col items-center justify-center w-full h-full text-text-muted-light dark:text-text-muted-dark hover:text-primary transition-colors"
        href="#">
        <span class="material-icons text-2xl mb-1">shield</span>
        <span class="text-[10px] font-medium">Insurance</span>
      </a>
      <a class="flex flex-col items-center justify-center w-full h-full text-text-muted-light dark:text-text-muted-dark hover:text-primary transition-colors"
        href="#">
        <span class="material-icons text-2xl mb-1">settings</span>
        <span class="text-[10px] font-medium">Settings</span>
      </a>
    </div>
  </nav>
</body>

</html>
