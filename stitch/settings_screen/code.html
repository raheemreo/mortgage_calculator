<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Settings Screen</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#1e3a8a", // Navy Blue
                        "background-light": "#f3f4f6",
                        "background-dark": "#111827",
                        "surface-light": "#ffffff",
                        "surface-dark": "#1f2937",
                        "text-light": "#111827",
                        "text-dark": "#f9fafb",
                        "text-muted-light": "#6b7280",
                        "text-muted-dark": "#9ca3af",
                        "border-light": "#e5e7eb",
                        "border-dark": "#374151"
                    },
                    fontFamily: {
                        display: ["Inter", "sans-serif"],
                    },
                    borderRadius: {
                        DEFAULT: "0.5rem",
                    },
                },
            },
        };
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body
    class="bg-background-light dark:bg-background-dark text-text-light dark:text-text-dark flex flex-col h-screen overflow-hidden">
    <header
        class="pt-12 pb-4 px-6 bg-surface-light dark:bg-surface-dark border-b border-border-light dark:border-border-dark flex-shrink-0">
        <h1 class="text-2xl font-bold">Settings</h1>
    </header>
    <main class="flex-1 overflow-y-auto pb-24">
        <div
            class="px-6 py-6 border-b border-border-light dark:border-border-dark bg-surface-light dark:bg-surface-dark mb-6">
            <div class="flex items-center gap-4">
                <div
                    class="w-16 h-16 rounded-full bg-primary text-white flex items-center justify-center text-2xl font-semibold">
                    JD
                </div>
                <div>
                    <h2 class="text-lg font-semibold">John Doe</h2>
                    <p class="text-text-muted-light dark:text-text-muted-dark text-sm">john.doe@example.com</p>
                </div>
            </div>
            <button
                class="mt-4 w-full py-2 border border-border-light dark:border-border-dark rounded-md text-sm font-medium hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors">
                Edit Profile
            </button>
        </div>
        <div class="px-6 mb-6">
            <h3
                class="text-sm font-semibold text-text-muted-light dark:text-text-muted-dark uppercase tracking-wider mb-3">
                Preferences</h3>
            <div
                class="bg-surface-light dark:bg-surface-dark rounded-lg border border-border-light dark:border-border-dark overflow-hidden">
                <div class="flex items-center justify-between p-4 border-b border-border-light dark:border-border-dark">
                    <div class="flex items-center gap-3">
                        <span class="material-icons text-primary">notifications</span>
                        <span>Notifications</span>
                    </div>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input checked="" class="sr-only peer" type="checkbox" value="" />
                        <div
                            class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer dark:bg-gray-700 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all dark:border-gray-600 peer-checked:bg-primary">
                        </div>
                    </label>
                </div>
                <button
                    class="w-full flex items-center justify-between p-4 border-b border-border-light dark:border-border-dark hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors">
                    <div class="flex items-center gap-3">
                        <span class="material-icons text-primary">attach_money</span>
                        <span>Currency</span>
                    </div>
                    <div class="flex items-center gap-2 text-text-muted-light dark:text-text-muted-dark">
                        <span>USD ($)</span>
                        <span class="material-icons text-sm">chevron_right</span>
                    </div>
                </button>
                <button
                    class="w-full flex items-center justify-between p-4 hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors">
                    <div class="flex items-center gap-3">
                        <span class="material-icons text-primary">palette</span>
                        <span>Theme</span>
                    </div>
                    <div class="flex items-center gap-2 text-text-muted-light dark:text-text-muted-dark">
                        <span>System</span>
                        <span class="material-icons text-sm">chevron_right</span>
                    </div>
                </button>
            </div>
        </div>
        <div class="px-6 mb-6">
            <h3
                class="text-sm font-semibold text-text-muted-light dark:text-text-muted-dark uppercase tracking-wider mb-3">
                About</h3>
            <div
                class="bg-surface-light dark:bg-surface-dark rounded-lg border border-border-light dark:border-border-dark overflow-hidden">
                <button
                    class="w-full flex items-center justify-between p-4 border-b border-border-light dark:border-border-dark hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors">
                    <div class="flex items-center gap-3">
                        <span class="material-icons text-primary">star</span>
                        <span>Rate App</span>
                    </div>
                    <span
                        class="material-icons text-text-muted-light dark:text-text-muted-dark text-sm">chevron_right</span>
                </button>
                <button
                    class="w-full flex items-center justify-between p-4 hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors">
                    <div class="flex items-center gap-3">
                        <span class="material-icons text-primary">share</span>
                        <span>Share with Friends</span>
                    </div>
                    <span
                        class="material-icons text-text-muted-light dark:text-text-muted-dark text-sm">chevron_right</span>
                </button>
            </div>
        </div>
        <div class="px-6 mb-8 text-center">
            <button
                class="text-red-500 font-medium py-2 px-4 rounded hover:bg-red-50 dark:hover:bg-red-900/20 transition-colors">
                Log Out
            </button>
            <p class="text-xs text-text-muted-light dark:text-text-muted-dark mt-4">Version 1.0.0</p>
        </div>
    </main>
    <nav
        class="fixed bottom-0 w-full bg-surface-light dark:bg-surface-dark border-t border-border-light dark:border-border-dark pb-safe">
        <div class="flex justify-around items-center h-16">
            <button
                class="flex flex-col items-center justify-center w-full h-full text-text-muted-light dark:text-text-muted-dark hover:text-primary dark:hover:text-primary transition-colors">
                <span class="material-icons">home</span>
                <span class="text-[10px] mt-1 font-medium">Home</span>
            </button>
            <button
                class="flex flex-col items-center justify-center w-full h-full text-text-muted-light dark:text-text-muted-dark hover:text-primary dark:hover:text-primary transition-colors">
                <span class="material-icons">shield</span>
                <span class="text-[10px] mt-1 font-medium">Insurance</span>
            </button>
            <button class="flex flex-col items-center justify-center w-full h-full text-primary">
                <span class="material-icons">settings</span>
                <span class="text-[10px] mt-1 font-medium">Settings</span>
            </button>
        </div>
    </nav>

</body>

</html>
