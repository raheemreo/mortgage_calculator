name: mortgage_calculator
description: "USA Mortgage Pro Calculator."
publish_to: "none"
version: 1.0.3+4

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^8.0.2
  google_mobile_ads: ^7.0.0
  fl_chart: ^1.1.1
  http: ^1.2.2
  intl: ^0.20.2
  math_expressions: ^3.1.0
  provider: ^6.1.5+1
  shared_preferences: ^2.5.4
  flutter_native_splash: ^2.4.4
  url_launcher: ^6.3.1
  firebase_core: ^4.5.0
  firebase_analytics: ^12.1.3
  firebase_crashlytics: ^5.0.8
  firebase_remote_config: ^6.2.0
  firebase_messaging: ^16.1.2
  package_info_plus: ^9.0.0
  pdf: ^3.11.1
  printing: ^5.13.2
  share_plus: ^12.0.1
  in_app_review: ^2.0.11
  cached_network_image: ^3.3.0
  flutter_staggered_animations: ^1.1.1
  flutter_svg: ^2.0.10+1
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  flutter_dotenv: ^6.0.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#0B3D91"
  image: "assets/icons/app_icon.png"
  android_12:
    color: "#0B3D91"
    image: "assets/icons/app_icon.png"
  android: true
  ios: true

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/icons/
    - assets/data/
